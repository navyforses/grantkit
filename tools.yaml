# MCP Toolbox for Databases — GrantKit configuration
# https://github.com/googleapis/mcp-toolbox
#
# Run the server:
#   npx @toolbox-sdk/server --config tools.yaml
# or (binary):
#   ./toolbox --config tools.yaml
#
# Required environment variables:
#   MYSQL_HOST, MYSQL_PORT, MYSQL_DATABASE, MYSQL_USER, MYSQL_PASSWORD

sources:
  grantkit-mysql:
    kind: mysql
    host: ${MYSQL_HOST:127.0.0.1}
    port: ${MYSQL_PORT:3306}
    database: ${MYSQL_DATABASE:grantkit}
    user: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}

tools:
  # ------------------------------------------------------------------
  # Grant catalog — public-facing search and lookup tools
  # ------------------------------------------------------------------

  list_grants:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      List active grants from the GrantKit catalog with pagination.
      Use this as a starting point when no specific keyword or filter is given.
    parameters:
      - name: limit
        type: integer
        description: Number of grants to return (1–50)
      - name: offset
        type: integer
        description: Number of grants to skip for pagination (0 = first page)
    statement: |
      SELECT itemId, name, organization, category, country,
             amount, deadline, fundingType, type
      FROM grants
      WHERE isActive = 1
      ORDER BY name ASC
      LIMIT ? OFFSET ?

  search_grants_by_keyword:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      Search for grants whose name, description, or organization contains the
      given keyword. Returns up to `limit` results ordered alphabetically.
    parameters:
      - name: keyword
        type: string
        description: >
          The search keyword (e.g. "cancer", "housing", "disability").
          Matched case-insensitively against name, description and organization.
      - name: keyword2
        type: string
        description: Same value as keyword — used for the second LIKE comparison.
      - name: keyword3
        type: string
        description: Same value as keyword — used for the third LIKE comparison.
      - name: limit
        type: integer
        description: Maximum number of results to return (recommended default 20)
    statement: |
      SELECT itemId, name, organization, description, category, country,
             amount, deadline, website, eligibility, fundingType, targetDiagnosis
      FROM grants
      WHERE isActive = 1
        AND (
          name        LIKE CONCAT('%', ?, '%')
          OR description LIKE CONCAT('%', ?, '%')
          OR organization LIKE CONCAT('%', ?, '%')
        )
      ORDER BY name ASC
      LIMIT ?

  list_grants_by_category:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      List all active grants belonging to a specific category
      (e.g. Medical, Housing, Education, Legal, Food).
    parameters:
      - name: category
        type: string
        description: >
          Exact category name. Call list_categories first to see valid values.
    statement: |
      SELECT itemId, name, organization, description, country,
             amount, deadline, website, eligibility, fundingType
      FROM grants
      WHERE isActive = 1
        AND category = ?
      ORDER BY name ASC
      LIMIT 50

  list_grants_by_country:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      List all active grants available in a specific country
      (e.g. USA, Canada, United Kingdom, Australia).
    parameters:
      - name: country
        type: string
        description: >
          Country name as stored in the database.
          Call list_countries first to see exact valid values.
    statement: |
      SELECT itemId, name, organization, description, category,
             amount, deadline, website, eligibility, fundingType
      FROM grants
      WHERE isActive = 1
        AND country = ?
      ORDER BY name ASC
      LIMIT 50

  get_grant_detail:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      Retrieve the complete record for a single grant including application
      process, required documents, diagnosis scope, age range, B-2 visa
      eligibility, and contact information.
    parameters:
      - name: item_id
        type: string
        description: >
          The unique itemId of the grant (e.g. "grant-42").
          Obtain this from search or list tools.
    statement: |
      SELECT itemId, name, organization, description, category, type,
             country, state, city, eligibility, website, phone, email,
             amount, status, applicationProcess, deadline, fundingType,
             targetDiagnosis, ageRange, geographicScope, documentsRequired,
             b2VisaEligible
      FROM grants
      WHERE itemId = ?
        AND isActive = 1

  list_categories:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      Return every distinct grant category in the database, together with
      the number of active grants in each category. Useful for helping a
      user narrow their search.
    parameters: []
    statement: |
      SELECT category, COUNT(*) AS grant_count
      FROM grants
      WHERE isActive = 1
      GROUP BY category
      ORDER BY grant_count DESC

  list_countries:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      Return every country that has at least one active grant, together with
      the count. Useful for helping a user pick the right country filter.
    parameters: []
    statement: |
      SELECT country, COUNT(*) AS grant_count
      FROM grants
      WHERE isActive = 1
      GROUP BY country
      ORDER BY grant_count DESC

  # ------------------------------------------------------------------
  # Admin / analytics tools
  # ------------------------------------------------------------------

  search_grants_admin:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      List ALL grants (active and inactive) with admin-visible fields including
      isActive status. Use this instead of list_grants when you need to review
      or manage deactivated grants.
    parameters:
      - name: limit
        type: integer
        description: Number of grants to return (1–100)
      - name: offset
        type: integer
        description: Number of grants to skip for pagination (0 = first page)
    statement: |
      SELECT itemId, name, organization, category, country,
             amount, deadline, fundingType, type, isActive,
             createdAt, updatedAt
      FROM grants
      ORDER BY updatedAt DESC
      LIMIT ? OFFSET ?

  list_incomplete_grants:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      Find active grants that are missing key fields: description, amount, or
      deadline. Use this to identify which grants need AI enrichment. Returns
      up to 50 results showing which fields are empty.
    parameters:
      - name: limit
        type: integer
        description: Maximum number of incomplete grants to return (default 50)
    statement: |
      SELECT itemId, name, organization, category, country,
             CASE WHEN description IS NULL OR description = '' THEN 'YES' ELSE 'no' END AS missing_description,
             CASE WHEN amount     IS NULL OR amount = ''      THEN 'YES' ELSE 'no' END AS missing_amount,
             CASE WHEN deadline   IS NULL OR deadline = ''    THEN 'YES' ELSE 'no' END AS missing_deadline,
             CASE WHEN website    IS NULL OR website = ''     THEN 'YES' ELSE 'no' END AS missing_website,
             CASE WHEN eligibility IS NULL OR eligibility = '' THEN 'YES' ELSE 'no' END AS missing_eligibility
      FROM grants
      WHERE isActive = 1
        AND (
          description IS NULL OR description = ''
          OR amount   IS NULL OR amount = ''
          OR deadline IS NULL OR deadline = ''
        )
      ORDER BY name ASC
      LIMIT ?

  upsert_grant:
    kind: mysql-execute-sql
    source: grantkit-mysql
    description: >
      Insert a new grant or update it if a grant with the same itemId already
      exists. This is the primary tool for bulk importing and updating grants.
      All text fields accept empty string '' when the value is unknown.
      - itemId: unique slug, e.g. "grant-cancer-care-fund" (no spaces)
      - type: "grant" or "resource"
      - status: "active" or "inactive"
      - isActive: 1 (active) or 0 (inactive)
      - b2VisaEligible: 1 (yes) or 0 (no/unknown)
    statement: |
      INSERT INTO grants (
        itemId, name, organization, description, category, type,
        country, state, city, eligibility, website, phone, email,
        amount, status, applicationProcess, deadline, fundingType,
        targetDiagnosis, ageRange, geographicScope, documentsRequired,
        b2VisaEligible, isActive, language
      ) VALUES (
        ?, ?, ?, ?, ?, ?,
        ?, ?, ?, ?, ?, ?, ?,
        ?, ?, ?, ?, ?,
        ?, ?, ?, ?,
        ?, 1, 'en'
      )
      ON DUPLICATE KEY UPDATE
        name              = VALUES(name),
        organization      = VALUES(organization),
        description       = VALUES(description),
        category          = VALUES(category),
        type              = VALUES(type),
        country           = VALUES(country),
        state             = VALUES(state),
        city              = VALUES(city),
        eligibility       = VALUES(eligibility),
        website           = VALUES(website),
        phone             = VALUES(phone),
        email             = VALUES(email),
        amount            = VALUES(amount),
        status            = VALUES(status),
        applicationProcess = VALUES(applicationProcess),
        deadline          = VALUES(deadline),
        fundingType       = VALUES(fundingType),
        targetDiagnosis   = VALUES(targetDiagnosis),
        ageRange          = VALUES(ageRange),
        geographicScope   = VALUES(geographicScope),
        documentsRequired = VALUES(documentsRequired),
        b2VisaEligible    = VALUES(b2VisaEligible),
        isActive          = VALUES(isActive),
        updatedAt         = NOW()
    parameters:
      - name: itemId
        type: string
        description: Unique slug identifier, e.g. "grant-cancer-care-fund" (no spaces, no special chars)
      - name: name
        type: string
        description: Full grant name
      - name: organization
        type: string
        description: Issuing organization / funder name
      - name: description
        type: string
        description: Full description of the grant. Use '' if unknown.
      - name: category
        type: string
        description: Category (e.g. Medical, Housing, Education, Legal, Food, Transportation)
      - name: type
        type: string
        description: "grant" or "resource"
      - name: country
        type: string
        description: Country name (e.g. USA, Canada, United Kingdom)
      - name: state
        type: string
        description: State or province. Use '' if not applicable.
      - name: city
        type: string
        description: City. Use '' if not applicable.
      - name: eligibility
        type: string
        description: Eligibility requirements. Use '' if unknown.
      - name: website
        type: string
        description: Application or info URL. Use '' if unknown.
      - name: phone
        type: string
        description: Contact phone number. Use '' if unknown.
      - name: email
        type: string
        description: Contact email. Use '' if unknown.
      - name: amount
        type: string
        description: Grant amount or range (e.g. "Up to $5,000", "Varies"). Use '' if unknown.
      - name: status
        type: string
        description: '"active" or "inactive"'
      - name: applicationProcess
        type: string
        description: How to apply. Use '' if unknown.
      - name: deadline
        type: string
        description: Application deadline (e.g. "December 31, 2025" or "Rolling"). Use '' if unknown.
      - name: fundingType
        type: string
        description: Type of funding (e.g. Grant, Scholarship, Loan, Voucher). Use '' if unknown.
      - name: targetDiagnosis
        type: string
        description: Specific medical condition targeted (e.g. "Cancer", "MS"). Use '' if not medical.
      - name: ageRange
        type: string
        description: Age requirements (e.g. "18-65", "Under 18"). Use '' if no restriction.
      - name: geographicScope
        type: string
        description: Geographic scope (e.g. "National", "State", "Local"). Use '' if unknown.
      - name: documentsRequired
        type: string
        description: Required application documents. Use '' if unknown.
      - name: b2VisaEligible
        type: integer
        description: 1 if eligible for B-2 visa holders, 0 otherwise

  update_grant_description:
    kind: mysql-execute-sql
    source: grantkit-mysql
    description: >
      Update the description for a specific grant by itemId.
      Use for AI enrichment after researching a grant's program details.
    parameters:
      - name: item_id
        type: string
        description: The unique itemId of the grant to update
      - name: description
        type: string
        description: The new description text
    statement: |
      UPDATE grants SET description = ?, updatedAt = NOW() WHERE itemId = ?

  update_grant_amount:
    kind: mysql-execute-sql
    source: grantkit-mysql
    description: >
      Update the amount field for a specific grant by itemId.
      Use for AI enrichment, e.g. "Up to $5,000" or "Varies".
    parameters:
      - name: item_id
        type: string
        description: The unique itemId of the grant to update
      - name: amount
        type: string
        description: Grant amount or range (e.g. "Up to $5,000", "Varies", "$500–$2,000")
    statement: |
      UPDATE grants SET amount = ?, updatedAt = NOW() WHERE itemId = ?

  update_grant_deadline:
    kind: mysql-execute-sql
    source: grantkit-mysql
    description: >
      Update the application deadline for a specific grant by itemId.
      Use for AI enrichment after checking the grant's website.
    parameters:
      - name: item_id
        type: string
        description: The unique itemId of the grant to update
      - name: deadline
        type: string
        description: Deadline text (e.g. "December 31, 2025", "Rolling", "Annual - March 1")
    statement: |
      UPDATE grants SET deadline = ?, updatedAt = NOW() WHERE itemId = ?

  update_grant_eligibility:
    kind: mysql-execute-sql
    source: grantkit-mysql
    description: >
      Update the eligibility requirements for a specific grant by itemId.
    parameters:
      - name: item_id
        type: string
        description: The unique itemId of the grant to update
      - name: eligibility
        type: string
        description: Eligibility requirements text
    statement: |
      UPDATE grants SET eligibility = ?, updatedAt = NOW() WHERE itemId = ?

  update_grant_website:
    kind: mysql-execute-sql
    source: grantkit-mysql
    description: >
      Update the website / application URL for a specific grant by itemId.
    parameters:
      - name: item_id
        type: string
        description: The unique itemId of the grant to update
      - name: website
        type: string
        description: Full URL to the grant application or info page
    statement: |
      UPDATE grants SET website = ?, updatedAt = NOW() WHERE itemId = ?

  deactivate_grant:
    kind: mysql-execute-sql
    source: grantkit-mysql
    description: >
      Soft-delete a grant by setting isActive = 0. The grant remains in the
      database and can be reactivated later. Use this instead of deleting.
    parameters:
      - name: item_id
        type: string
        description: The unique itemId of the grant to deactivate
    statement: |
      UPDATE grants
      SET isActive = 0, status = 'inactive', updatedAt = NOW()
      WHERE itemId = ?

  reactivate_grant:
    kind: mysql-execute-sql
    source: grantkit-mysql
    description: >
      Restore a previously deactivated grant by setting isActive = 1.
    parameters:
      - name: item_id
        type: string
        description: The unique itemId of the grant to reactivate
    statement: |
      UPDATE grants
      SET isActive = 1, status = 'active', updatedAt = NOW()
      WHERE itemId = ?

  grant_database_stats:
    kind: mysql-sql
    source: grantkit-mysql
    description: >
      High-level statistics about the GrantKit grant database: total grants,
      active vs inactive, category and country diversity, grant vs resource split.
    parameters: []
    statement: |
      SELECT
        COUNT(*)                                              AS total_grants,
        SUM(CASE WHEN isActive = 1 THEN 1 ELSE 0 END)       AS active_grants,
        SUM(CASE WHEN isActive = 0 THEN 1 ELSE 0 END)       AS inactive_grants,
        COUNT(DISTINCT category)                             AS total_categories,
        COUNT(DISTINCT country)                              AS total_countries,
        SUM(CASE WHEN type = 'grant'    THEN 1 ELSE 0 END)  AS grants_count,
        SUM(CASE WHEN type = 'resource' THEN 1 ELSE 0 END)  AS resources_count
      FROM grants

  list_tables:
    kind: mysql-list-tables
    source: grantkit-mysql
    description: >
      List all tables in the GrantKit database with their column definitions,
      indexes, and constraints. Useful for schema exploration.

  execute_sql:
    kind: mysql-execute-sql
    source: grantkit-mysql
    description: >
      Execute any custom SQL query against the GrantKit database — SELECT, INSERT,
      UPDATE, or DELETE. For administrative use only. Use for one-off queries,
      bulk operations, or anything not covered by the specific named tools.
      Example: UPDATE grants SET category = 'Medical' WHERE category = 'Health'

toolsets:
  # Tools available to the public AI grant assistant
  public:
    name: public
    tools:
      - list_grants
      - search_grants_by_keyword
      - list_grants_by_category
      - list_grants_by_country
      - get_grant_detail
      - list_categories
      - list_countries

  # Full toolset for admin AI assistant and DB exploration
  admin:
    name: admin
    tools:
      - list_grants
      - search_grants_by_keyword
      - list_grants_by_category
      - list_grants_by_country
      - get_grant_detail
      - list_categories
      - list_countries
      - search_grants_admin
      - list_incomplete_grants
      - upsert_grant
      - update_grant_description
      - update_grant_amount
      - update_grant_deadline
      - update_grant_eligibility
      - update_grant_website
      - deactivate_grant
      - reactivate_grant
      - grant_database_stats
      - list_tables
      - execute_sql
